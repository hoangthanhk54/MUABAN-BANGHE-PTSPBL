<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÂN LÔ BÁN NỀN -PTSPBL</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #121212; color: #fff; padding: 15px 5px; margin: 0; }
        
        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 30px; margin-top: 15px; flex-wrap: wrap; max-width: 1600px; margin-left: auto; margin-right: auto; }

        /* CỘT 1: ẢNH SƠ ĐỒ GỐC */
        .image-container { background: #2a2a2a; padding: 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex: 1.6; min-width: 300px; width: 100%; box-sizing: border-box; }
        .image-container img { width: 100%; height: auto; border-radius: 5px; border: 2px solid #444; display: block; }

        /* CỘT 2: SƠ ĐỒ CHỌN CHỖ */
        .office-container { 
            background: #e8e6df; 
            padding: 25px 15px; 
            border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            color: #333; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
            box-sizing: border-box;
        }
        
        .screen-indicator { width: 100%; min-width: 200px; height: 8px; background: #00bcd4; margin-bottom: 5px; border-radius: 4px; }
        .screen-text { font-size: 12px; font-weight: bold; color: #00bcd4; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }

        /* BỐ CỤC KHU VỰC BÀN GHẾ */
        .section-top { display: flex; flex-direction: column; gap: 4px; margin-bottom: 30px; }
        .section-bottom { display: flex; justify-content: center; gap: 30px; } 
        .row { display: flex; justify-content: center; gap: 4px; margin: 4px 0; width: max-content; }
        .cluster { display: flex; gap: 4px; } 
        .column { display: flex; flex-direction: column; gap: 4px; }
        .seat-wrapper { padding: 12px; display: inline-block; position: relative; box-sizing: border-box; }

        /* CỘT TRỤ (PILLAR) */
        .pillar { width: 55px; height: 45px; background-color: #222; border-radius: 4px; box-sizing: border-box; margin: 0; }

        /* THIẾT KẾ BÀN & GHẾ */
        .seat { width: 55px; height: 45px; background-color: #fff; border: 2px solid #888; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #333; position: relative; transition: all 0.2s; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); box-sizing: border-box; margin: 0; }
        .seat .user-name { font-size: 9px; font-weight: normal; max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; color: #555; }
        
        .seat::after { content: ''; position: absolute; background-color: #555; transition: all 0.2s; }
        .chair-top::after    { width: 26px; height: 12px; top: -16px; left: 12.5px; border-radius: 10px 10px 4px 4px; }
        .chair-bottom::after { width: 26px; height: 12px; bottom: -16px; left: 12.5px; border-radius: 4px 4px 10px 10px; }
        .chair-left::after   { width: 12px; height: 26px; left: -16px; top: 7.5px; border-radius: 10px 4px 4px 10px; }
        .chair-right::after  { width: 12px; height: 26px; right: -16px; top: 7.5px; border-radius: 4px 10px 10px 4px; }

        /* (1) MÀU TÍM NHẠT CHO KHU VỰC GHẾ ĐƯỢC CHỈ ĐỊNH (39-52) */
        .seat.purple-zone { background-color: #f4ecf7; border-color: #bb8fce; }
        .seat.purple-zone::after { background-color: #bb8fce; }

        /* MÀU SẮC TRẠNG THÁI */
        .seat.selected { background-color: #2ecc71; border-color: #27ae60; color: #fff; }
        .seat.selected::after { background-color: #27ae60; }
        .seat.selected .user-name { color: #fff; }
        
        .seat.occupied { background-color: #e74c3c; border-color: #c0392b; color: #fff; cursor: not-allowed; }
        .seat.occupied::after { background-color: #c0392b; }
        .seat.occupied .user-name { color: #f1c40f; font-weight: bold; } 
        
        .seat.my-seat { background-color: #3498db; border-color: #2980b9; color: #fff; cursor: pointer; }
        .seat.my-seat::after { background-color: #2980b9; }
        .seat.my-seat .user-name { color: #fff; font-weight: bold; }

        /* CHÚ THÍCH & NÚT XÁC NHẬN */
        .legend { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; color: #fff; font-size: 13px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend .seat-wrapper { padding: 6px; }
        .legend .seat { width: 30px; height: 20px; font-size: 9px; }
        .legend .chair-top::after { width: 14px; height: 6px; top: -9px; left: 6px; }

        #btn-confirm { margin-top: 20px; margin-bottom: 30px; padding: 14px 20px; font-size: 15px; background-color: #f1c40f; color: #000; border: none; border-radius: 30px; font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 15px rgba(241,196,15,0.4); transition: 0.3s; width: 90%; max-width: 400px; }
        #btn-confirm.active:hover { background-color: #f39c12; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(241,196,15,0.6); cursor: pointer; }
        #btn-confirm.disabled { background-color: #7f8c8d; color: #ddd; box-shadow: none; cursor: not-allowed; transform: none; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 650px) {
            body { padding: 10px 0; }
            .office-container { padding: 15px 2px; }
            .screen-text { font-size: 10px; margin-bottom: 20px; }
            
            .seat-wrapper { padding: 4px; }
            .seat { width: 32px; height: 26px; font-size: 11px; border-width: 1px; }
            .seat .user-name { font-size: 7px; max-width: 30px; margin-top: 1px; }
            
            .pillar { width: 32px; height: 26px; box-sizing: border-box; margin: 0; }
            
            .chair-top::after    { width: 16px; height: 6px; top: -8px; left: 7px; border-radius: 4px 4px 2px 2px; }
            .chair-bottom::after { width: 16px; height: 6px; bottom: -8px; left: 7px; border-radius: 2px 2px 4px 4px; }
            .chair-left::after   { width: 6px; height: 16px; left: -8px; top: 4px; border-radius: 4px 2px 2px 4px; }
            .chair-right::after  { width: 6px; height: 16px; right: -8px; top: 4px; border-radius: 2px 4px 4px 2px; }

            .section-top { gap: 2px; margin-bottom: 15px; }
            .section-bottom { gap: 6px; }
            .row { gap: 2px; margin: 2px 0; }
            .cluster { gap: 2px; }
            .column { gap: 2px; }
            
            .image-container { padding: 10px; margin: 0 10px; border-radius: 8px; width: calc(100% - 20px); }
            h2 { font-size: 16px; padding: 0 10px; }
            p { font-size: 11px; padding: 0 15px; }
            .legend { font-size: 11px; gap: 8px; padding: 0 10px; }
            #btn-confirm { font-size: 13px; padding: 12px 10px; }
        }
    </style>
</head>
<body>

    <h2>PHÂN LÔ BÁN NỀN -PTSPBL</h2>
    <p style="color: #bbb; max-width: 700px; margin: 0 auto 15px auto; line-height: 1.5;">
        🔒 Mỗi thiết bị chỉ được chọn <b>1 Bàn</b>. Hệ thống tự động ghi nhớ.<br>
        Bàn màu <span style="color:#3498db; font-weight:bold;">Xanh dương</span> là của bạn. Click vào nó để HỦY trước khi đổi bàn.
    </p>

    <div class="main-layout">
        <div class="image-container">
            <img src="z7873372570054_88bbeb03b4c540a67e6be62aab37cd6c.jpg" alt="Sơ đồ mặt bằng">
        </div>

        <div class="office-container">
            <div class="screen-indicator"></div>
            <div class="screen-text">HƯỚNG BẮC (Khu vực cửa kính)</div>

            <div class="section-top" id="top-section"></div>
            <div class="section-bottom" id="bottom-section"></div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="seat-wrapper"><div class="seat chair-top"></div></div> Bàn trống</div>
        <div class="legend-item"><div class="seat-wrapper"><div class="seat purple-zone chair-top"></div></div> Ghế dãy 39-52</div>
        <div class="legend-item"><div class="seat-wrapper"><div class="seat chair-top selected"></div></div> Đang chọn thử</div>
        <div class="legend-item"><div class="seat-wrapper"><div class="seat chair-top my-seat"></div></div> Bàn của bạn</div>
        <div class="legend-item"><div class="seat-wrapper"><div class="seat chair-top occupied"></div></div> Đã có người</div>
    </div>

    <button id="btn-confirm" class="active">XÁC NHẬN ĐẶT CHỖ</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDH4HpMMpXn83kFwycMa2hsDmkKBQLgZk",
            authDomain: "booking-seat-b5a85.firebaseapp.com",
            projectId: "booking-seat-b5a85",
            storageBucket: "booking-seat-b5a85.firebasestorage.app",
            messagingSenderId: "777481998835",
            appId: "1:777481998835:web:cb21bf207fef2bf0f60286",
            measurementId: "G-9P08JREKB6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const seatsRef = ref(db, 'seats');

        let selectedSeatLocal = null; 
        let occupiedSeatsFromServer = {};

        let myDeviceId = localStorage.getItem('cinema_device_id');
        if (!myDeviceId) {
            myDeviceId = 'dev_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
            localStorage.setItem('cinema_device_id', myDeviceId);
        }

        const topSeatsLayout = [
            [{id: 66, dir: 'top'}, {id: 67, dir: 'top'}, {id: 68, dir: 'top'}, {id: 69, dir: 'top'}, {id: 70, dir: 'top'}, {id: 71, dir: 'top'}, {id: 72, dir: 'top'}],
            [{id: 59, dir: 'bottom'}, {id: 60, dir: 'bottom'}, {id: 61, dir: 'bottom'}, {id: 62, dir: 'bottom'}, {id: 63, dir: 'bottom'}, {id: 64, dir: 'bottom'}, {id: 65, dir: 'bottom'}],
            [{id: 53, dir: 'top'}, {id: 54, dir: 'top'}, {id: -1}, {id: 55, dir: 'top'}, {id: 56, dir: 'top'}, {id: 57, dir: 'top'}, {id: 58, dir: 'top'}],
            [{id: 46, dir: 'bottom'}, {id: 47, dir: 'bottom'}, {id: 48, dir: 'bottom'}, {id: 49, dir: 'bottom'}, {id: 50, dir: 'bottom'}, {id: 51, dir: 'bottom'}, {id: 52, dir: 'bottom'}],
            [{id: 39, dir: 'top'}, {id: 40, dir: 'top'}, {id: 41, dir: 'top'}, {id: 42, dir: 'top'}, {id: 43, dir: 'top'}, {id: 44, dir: 'top'}, {id: 45, dir: 'top'}],
            [{id: 32, dir: 'bottom'}, {id: 33, dir: 'bottom'}, {id: 34, dir: 'bottom'}, {id: 35, dir: 'bottom'}, {id: 36, dir: 'bottom'}, {id: 37, dir: 'bottom'}, {id: 38, dir: 'bottom'}],
            [{id: 25, dir: 'top'}, {id: 26, dir: 'top'}, {id: 27, dir: 'top'}, {id: 28, dir: 'top'}, {id: 29, dir: 'top'}, {id: 30, dir: 'top'}, {id: 31, dir: 'top'}],
        ];

        const bottomClustersLayout = [
            [[{id: 1, dir: 'right'}, {id: 2, dir: 'right'}, {id: 3, dir: 'right'}, {id: 4, dir: 'right'}]],
            [
                [{id: 5, dir: 'left'}, {id: 6, dir: 'left'}, {id: 7, dir: 'left'}, {id: 8, dir: 'left'}],
                [{id: 9, dir: 'right'}, {id: 10, dir: 'right'}, {id: 11, dir: 'right'}, {id: 12, dir: 'right'}]
            ],
            [
                [{id: 13, dir: 'left'}, {id: 14, dir: 'left'}, {id: 15, dir: 'left'}, {id: 16, dir: 'left'}],
                [{id: 17, dir: 'right'}, {id: 18, dir: 'right'}, {id: 19, dir: 'right'}, {id: 20, dir: 'right'}]
            ],
            [[{id: 21, dir: 'left'}, {id: 22, dir: 'left'}, {id: 23, dir: 'left'}, {id: 24, dir: 'left'}]]
        ];

        onValue(seatsRef, (snapshot) => {
            occupiedSeatsFromServer = snapshot.val() || {};
            renderGrid(); 
        });

        function getMyBookedSeatId() {
            for (let seatId in occupiedSeatsFromServer) {
                if (occupiedSeatsFromServer[seatId] && occupiedSeatsFromServer[seatId].deviceId === myDeviceId) {
                    return seatId; 
                }
            }
            return null;
        }

        function createSeatElement(seatData, myCurrentBookedSeat) {
            if (seatData.id === -1) {
                const pillar = document.createElement('div');
                pillar.className = 'seat-wrapper';
                pillar.innerHTML = '<div class="pillar"></div>';
                return pillar;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'seat-wrapper';
            const seatIdStr = seatData.id < 10 ? 'Chỗ ngồi 0' + seatData.id : 'Chỗ ngồi ' + seatData.id;
            
            const seat = document.createElement('div');
            seat.className = `seat chair-${seatData.dir}`;
            
            // GẮN CLASS MÀU TÍM CHO GHẾ TỪ 39 ĐẾN 52
            if (seatData.id >= 39 && seatData.id <= 52) {
                seat.classList.add('purple-zone');
            }
            
            const seatLabel = document.createElement('span');
            seatLabel.innerText = seatData.id < 10 ? '0' + seatData.id : seatData.id; 
            seat.appendChild(seatLabel);

            const nameLabel = document.createElement('div');
            nameLabel.className = 'user-name';
            
            if (occupiedSeatsFromServer[seatIdStr]) {
                const sData = occupiedSeatsFromServer[seatIdStr];
                nameLabel.innerText = sData.name;
                
                if (sData.deviceId === myDeviceId) {
                    seat.classList.add('my-seat');
                    seat.title = "Bàn của bạn. Click để HỦY.";
                    seat.addEventListener('click', () => {
                        if (confirm(`Bạn muốn trả lại ${seatIdStr} chứ?`)) {
                            remove(ref(db, 'seats/' + seatIdStr)).then(() => alert(`Đã hủy ${seatIdStr} thành công.`));
                        }
                    });
                } else {
                    seat.classList.add('occupied');
                    seat.title = `Đã được đặt bởi ${sData.name}`;
                    seat.addEventListener('click', () => alert("Vị trí này đã có người ngồi!"));
                }
            } else {
                if (selectedSeatLocal === seatIdStr) {
                    seat.classList.add('selected');
                    nameLabel.innerText = "Chọn...";
                }
                
                seat.addEventListener('click', () => {
                    if (myCurrentBookedSeat) {
                        alert(`❌ Bạn đã sở hữu [${myCurrentBookedSeat}]. Vui lòng hủy bàn màu xanh dương trước khi chọn bàn mới.`);
                        return;
                    }
                    selectedSeatLocal = (selectedSeatLocal === seatIdStr) ? null : seatIdStr; 
                    renderGrid(); 
                });
            }
            
            seat.appendChild(nameLabel);
            wrapper.appendChild(seat);
            return wrapper;
        }

        function renderGrid() {
            const topSection = document.getElementById('top-section');
            const bottomSection = document.getElementById('bottom-section');
            topSection.innerHTML = '';
            bottomSection.innerHTML = '';

            const myCurrentBookedSeat = getMyBookedSeatId();

            topSeatsLayout.forEach(rowArr => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowArr.forEach(seatData => { rowDiv.appendChild(createSeatElement(seatData, myCurrentBookedSeat)); });
                topSection.appendChild(rowDiv);
            });

            bottomClustersLayout.forEach(clusterArr => {
                const clusterDiv = document.createElement('div');
                clusterDiv.className = 'cluster';
                clusterArr.forEach(colArr => {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'column';
                    colArr.forEach(seatData => { colDiv.appendChild(createSeatElement(seatData, myCurrentBookedSeat)); });
                    clusterDiv.appendChild(colDiv);
                });
                bottomSection.appendChild(clusterDiv);
            });

            const btnConfirm = document.getElementById('btn-confirm');
            if (myCurrentBookedSeat) {
                btnConfirm.className = 'disabled';
                btnConfirm.innerText = `BẠN ĐÃ ĐẶT [${myCurrentBookedSeat}]`;
                btnConfirm.onclick = () => alert("Bạn đã có chỗ rồi! Hãy Hủy chỗ cũ (Bàn màu xanh dương) nếu muốn đổi chỗ khác.");
                selectedSeatLocal = null; 
            } else {
                btnConfirm.className = 'active';
                btnConfirm.innerText = "XÁC NHẬN ĐẶT CHỖ";
                btnConfirm.onclick = executeBooking;
            }
        }

        async function executeBooking() {
            if (!selectedSeatLocal) {
                alert('Vui lòng click chọn 1 bàn làm việc trống trên sơ đồ!');
                return;
            }

            let yourName = prompt(`Bạn đang khóa vị trí [${selectedSeatLocal}].\nVui lòng nhập tên của bạn:`);
            if (!yourName || yourName.trim() === "") return;

            const seatToBook = selectedSeatLocal;
            const singleSeatRef = ref(db, 'seats/' + seatToBook);
            const bookingData = { name: yourName.trim(), deviceId: myDeviceId };

            await runTransaction(singleSeatRef, (currentData) => {
                return (currentData === null) ? bookingData : undefined;
            }).then((result) => {
                if (result.committed) {
                    alert(`Thành công! Bạn đã giữ chỗ tại ${seatToBook}.`);
                    selectedSeatLocal = null; 
                } else {
                    alert(`Rất tiếc! Bàn ${seatToBook} vừa có người nhanh tay chọn trước.`);
                    selectedSeatLocal = null;
                }
                renderGrid();
            });
        }
    </script>
</body>
</html>
